<!DOCTYPE html>
<html>
<head>

<title>Login - AS Solutions</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.login-box{

background:white;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,.3);

}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

input{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;

}

button{

width:100%;
padding:12px;
background:#000;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#444;

}

.links{

margin-top:15px;
text-align:center;

}

.links a{

text-decoration:none;
color:#2a5298;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<div class="links">

<p><a href="#">Forgot Password?</a></p>

<p>Don't have an account? <a href="#">Create Account</a></p>

</div>

</div>

</body>
</html>
