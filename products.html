<!DOCTYPE html>
<html>

<head>

<title>Products - As Solutions</title>



<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial;
background:#111;
color:white;

}


/* Navigation */

nav{

height:70px;
background:black;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 50px;

}


.logo{

font-size:30px;
color:gold;
font-weight:bold;

}


nav ul{

display:flex;
gap:30px;
list-style:none;

}


nav ul li a{

color:white;
text-decoration:none;
font-size:18px;

}


/* Product Section */

.products{

padding:50px;

display:flex;
justify-content:center;
gap:40px;

}


.card{

background:white;
color:black;
width:300px;
padding:20px;
text-align:center;
border-radius:15px;

}


.card img{

width:100%;
height:300px;
object-fit:cover;
border-radius:10px;

}


.card h2{

margin:15px 0;

}


.card button{

background:red;
color:white;
border:none;
padding:12px 30px;
border-radius:8px;
cursor:pointer;

}
.card{
    position:relative;
}

.wishlist{

position:absolute;

top:10px;

right:10px;

width:40px;

height:40px;

border:none;

border-radius:50%;

background:white;

color:red;

font-size:22px;

cursor:pointer;

transition:.3s;

}

.wishlist.active{

background:red;

color:white;

transform:scale(1.1);

}


</style>

</head>


<body>


<nav>

<div class="logo">
As Solutions
</div>

<header class="page-header">
    <h1>Our Perfumes</h1>
    <p>Choose your favorite fragrance</p>
</header>

<div class="search-box">
    <input
        type="text"
        id="searchInput"
        onkeyup="searchProducts()"
        placeholder="🔍 Search perfumes..."
    >
</div>
<ul>

<li><a href="index.html">Home</a></li>

<li><a href="products.html">Products</a></li>

<li><a href="contact.html">Contact</a></li>

<li><a href="login.html">Login</a></li>

</ul>


</nav>



<section class="products">

<!-- First Product -->
<div class="card">
    <button class="wishlist" onclick="toggleWish(this)">❤</button>

    <img src="image/perfume1.jpg.jpeg" alt="Perfume">

    <h3>Luxury Perfume</h3>

    <p>₹999</p>

    <a href="product1.html">
        <button>View More</button>
    </a>
</div></div>


<!-- Second Product -->
<div class="card">
    <button class="wishlist" onclick="toggleWish(this)">❤</button>

    <img src="image/perfume1.jpg.jpeg" alt="Perfume">

    <h3>Luxury Perfume</h3>

    <p>₹999</p>

    <a href="product1.html">
        <button>View More</button>
    </a>
</div>
</section>

<script>

function toggleWish(btn){

btn.classList.toggle("active");

}

</script>

</body>

</html>
