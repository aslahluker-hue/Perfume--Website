<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products - As Solutions</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#111;
color:white;
}

/* Navigation */

nav{
background:black;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
}

.logo{
font-size:30px;
color:gold;
font-weight:bold;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav ul li a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

nav ul li a:hover{
color:gold;
}

/* Products */

.products{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding:50px 20px;
}

.card{
background:white;
color:black;
width:300px;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 10px rgba(255,255,255,0.2);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
border-radius:10px;
}

.card h2{
margin:15px 0;
}

.card p{
margin-bottom:15px;
}

.card button{
background:red;
color:white;
border:none;
padding:12px 30px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.card button:hover{
background:darkred;
}

/* Footer */

footer{
background:black;
text-align:center;
padding:20px;
margin-top:40px;
}

footer p{
margin:5px;
font-size:16px;
}

/* Mobile */

@media(max-width:768px){

nav{
flex-direction:column;
padding:15px;
}

nav ul{
margin-top:10px;
gap:15px;
}

.products{
flex-direction:column;
align-items:center;
padding:20px;
}

.card{
width:90%;
max-width:350px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">
As Solutions
</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>

<section class="products">

<div class="card">

<img src="image/perfume1.jpg.jpeg" alt="As Pookiee Perfume">

<h2>As Pookiee</h2>

<p>Premium Imported Fragrance</p>

<a href="product1.html">
<button>View More</button>
</a>

</div>

<div class="card">

<img src="image/perfume2.jpg.jpeg" alt="As Asthetic Perfume">

<h2>As Asthetic</h2>

<p>Luxury Imported Fragrance</p>

<a href="product2.html">
<button>View More</button>
</a>

</div>

</section>

<footer>

<p>© 2026 As Solutions. All Rights Reserved.</p>

<p>Email: assolutions@gmail.com | Phone: +91 8547576987</p>

</footer>

</body>

</html>
