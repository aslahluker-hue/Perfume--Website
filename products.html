<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products - As Solutions</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f1f3f6;
}

/* Navigation */

nav{
height:70px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 50px;
}

.logo{
font-size:30px;
color:gold;
font-weight:bold;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}

nav ul li a{
color:white;
text-decoration:none;
font-size:18px;
}

nav ul li a:hover{
color:gold;
}

/* Header */

.page-header{
text-align:center;
padding:30px;
background:white;
}

.page-header h1{
font-size:35px;
color:#222;
}

.page-header p{
color:#666;
margin-top:10px;
}

/* Search */

.search-box{
text-align:center;
padding:20px;
background:white;
}

.search-box input{
width:350px;
max-width:90%;
padding:12px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

/* Products */

.products{
padding:20px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
position:relative;
box-shadow:0 2px 8px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:contain;
}

.card h3{
margin:12px 0;
font-size:20px;
color:#222;
}

.rating{
display:inline-block;
background:green;
color:white;
padding:4px 8px;
border-radius:4px;
font-size:14px;
}

.price{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.old-price{
text-decoration:line-through;
color:gray;
margin-left:8px;
font-size:16px;
}

.offer{
color:green;
margin-left:8px;
font-size:14px;
}

.card button{
width:100%;
margin-top:15px;
padding:12px;
background:#fb641b;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

.card button:hover{
background:#d94f00;
}

/* Tablet */

@media(max-width:992px){

.products{
grid-template-columns:repeat(2,1fr);
}

}

/* Mobile */

@media(max-width:600px){

nav{
padding:10px;
flex-direction:column;
height:auto;
}

nav ul{
margin-top:10px;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

.logo{
font-size:24px;
}

.page-header h1{
font-size:28px;
}

.search-box input{
width:95%;
}

.products{
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
padding:10px;
}

.card img{
height:130px;
}

.card h3{
font-size:15px;
}

.rating{
font-size:11px;
padding:3px 6px;
}

.price{
font-size:18px;
}

.old-price{
font-size:12px;
}

.offer{
font-size:11px;
display:block;
margin-top:5px;
margin-left:0;
}

.card button{
padding:8px;
font-size:13px;
}

}

/* Very Small Mobile */

@media(max-width:400px){

.products{
grid-template-columns:1fr;
}

.card img{
height:180px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">
AS Solutions
</div>

<ul>

<li><a href="index.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="login.html">Login</a></li>

</ul>

</nav>

<header class="page-header">

<h1>Our Perfumes</h1>

<p>Choose your favorite fragrance</p>

</header>

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="🔍 Search Perfumes..."
onkeyup="searchProducts()">

</div>

<section class="products">

<div class="card">



<img src="image/perfume1.jpg.jpeg">

<h3>Luxury Perfume</h3>

<div class="rating">4.5 ★</div>

<p class="price">
₹999
<span class="old-price">₹1499</span>
<span class="offer">33% OFF</span>
</p>

<a href="product1.html">
<button>View More</button>
</a>

</div>

<div class="card">


<img src="image/perfume2.jpg">

<h3>Royal Oud</h3>

<div class="rating">4.6 ★</div>

<p class="price">
₹1299
<span class="old-price">₹1899</span>
<span class="offer">32% OFF</span>
</p>

<a href="product2.html">
<button>View More</button>
</a>

</div>

<div class="card">



<img src="image/perfume3.jpg">

<h3>Black Musk</h3>

<div class="rating">4.8 ★</div>

<p class="price">
₹1499
<span class="old-price">₹2499</span>
<span class="offer">40% OFF</span>
</p>

<a href="product3.html">
<button>View More</button>
</a>

</div>

<div class="card">


<img src="image/perfume4.jpg">

<h3>Ocean Fresh</h3>

<div class="rating">4.7 ★</div>

<p class="price">
₹899
<span class="old-price">₹1399</span>
<span class="offer">36% OFF</span>
</p>

<a href="product4.html">
<button>View More</button>
</a>

</div>

</section>

<script>

function toggleWish(btn){
btn.classList.toggle("active");
}

function searchProducts(){

let input=document.getElementById("searchInput").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(function(card){

let name=card.querySelector("h3").innerText.toLowerCase();

if(name.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

</script>

</body>
</html>
