<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - AS Solutions</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:14px;
background:#000;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#444;
}
</style>
</head>

<body>

<div class="container">

<h2>Checkout</h2>

<form action="payment.html">

<input type="text" placeholder="Full Name" required>

<input type="tel" placeholder="Mobile Number" required>

<textarea placeholder="Delivery Address" required></textarea>

<button type="submit">Continue to Payment</button>

</form>

</div>

</body>
</html>
