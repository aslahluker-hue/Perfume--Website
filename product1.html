<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>As Solutions - Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#111;
color:white;
}

/* Navigation */

nav{
background:black;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
}

.logo{
font-size:30px;
color:gold;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:bold;
}

nav a:hover{
color:gold;
}

/* Product */

.product{
display:flex;
justify-content:center;
align-items:center;
gap:60px;
padding:60px;
flex-wrap:wrap;
}

.product img{
width:400px;
max-width:100%;
height:auto;
border-radius:15px;
}

.details{
max-width:450px;
}

.details h1{
font-size:45px;
color:gold;
margin-bottom:15px;
}

.details h2{
font-size:30px;
margin-bottom:20px;
}

.details p{
font-size:20px;
line-height:1.6;
}

button{
background:red;
color:white;
padding:15px 40px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:darkred;
}

footer{
background:black;
text-align:center;
padding:20px;
margin-top:40px;
}

footer p{
margin:5px;
}

/* Mobile */

@media(max-width:768px){

nav{
flex-direction:column;
padding:15px;
}

nav div:last-child{
margin-top:10px;
}

nav a{
margin:0 10px;
}

.product{
flex-direction:column;
padding:20px;
text-align:center;
gap:25px;
}

.product img{
width:90%;
}

.details h1{
font-size:34px;
}

.details h2{
font-size:26px;
}

.details p{
font-size:18px;
}

button{
width:90%;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">
As Solutions
