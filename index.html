}

  /* ===========================
   Mobile Responsive Design
=========================== */

@media screen and (max-width:768px){

body{
background-size:cover;
background-position:center;
}

.overlay{

.content{

display:block;

}

button{
width:90%;
padding:15px;
font-size:18px;
}

.product{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
gap:20px;
}

.product img{
width:90%;
max-width:350px;
height:auto;
}

.details{
text-align:center;
}

.contact{
width:95%;
margin:auto;
padding:20px;
}

input,
textarea{
width:100%;
font-size:16px;
padding:12px;
}

footer{
padding:20px;
text-align:center;
}

.slider{
width:320px;
margin:0 auto 25px auto;
}

.slides{
width:100%;
height:320px;
object-fit:cover;
border-radius:15px;
display:none;
}
</style>

</head>

<body>

</div>

</div>
<footer>

<p>© 2026 As Solutions. All Rights Reserved.</p>

</footer>

<script>

let slideIndex = 0;

showSlides();

function showSlides(){

let slides = document.getElementsByClassName("slides");

for(let i=0;i<slides.length;i++){
slides[i].style.display="none";
}

slideIndex++;

if(slideIndex>slides.length){
slideIndex=1;
}

slides[slideIndex-1].style.display="block";

setTimeout(showSlides,3000);

}

</script>

</body>

</footer>
