<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - As Solutions</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#111;
color:white;
}

nav{
background:black;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 50px;
}

.logo{
font-size:30px;
color:gold;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
}

.contact{
width:500px;
margin:60px auto;
background:#222;
padding:30px;
border-radius:10px;
}

.contact h1{
text-align:center;
margin-bottom:20px;
color:gold;
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:red;
color:white;
border:none;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkred;
}
  @media (max-width:768px){

.product{
flex-direction:column;
text-align:center;
}

.product img{
width:90%;
height:auto;
}

nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

button{
width:90%;
}

h1{
font-size:32px;
}

p{
font-size:18px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">
As Solutions
</div>

<div>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="contact.html">Contact</a>
</div>

</nav>

<div class="contact">

<h1>Contact Us</h1>

<form onsubmit="sendWhatsApp(); return false;">

<input type="text" id="name" placeholder="Your Name" required><br><br>

<input type="email" id="email" placeholder="Your Email" required><br><br>

<textarea id="message" placeholder="Your Message" required></textarea><br><br>

<button type="submit">Send to WhatsApp</button>

</form>


</div>
<script>

function sendWhatsApp(){

var name=document.getElementById("name").value;
var email=document.getElementById("email").value;
var message=document.getElementById("message").value;

var url="https://wa.me/918547576987?text="
+"Name: "+encodeURIComponent(name)
+"%0AEmail: "+encodeURIComponent(email)
+"%0AMessage: "+encodeURIComponent(message);

window.open(url,"_blank");

}

</body>

</html>
