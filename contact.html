<!DOCTYPE html>
<html>

<head>

<title>Contact - As Solutions</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#111;
color:white;
}

nav{
background:black;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 50px;
}

.logo{
font-size:30px;
color:gold;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
}

.contact{
width:500px;
margin:60px auto;
background:#222;
padding:30px;
border-radius:10px;
}

.contact h1{
text-align:center;
margin-bottom:20px;
color:gold;
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:red;
color:white;
border:none;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkred;
}

</style>

</head>

<body>

<nav>

<div class="logo">
As Solutions
</div>

<div>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="contact.html">Contact</a>
</div>

</nav>

<div class="contact">

<h1>Contact Us</h1>

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Email Address" required>

<textarea rows="6" placeholder="Your Message"></textarea>

<button type="submit">
Send Message
</button>

</form>

</div>

</body>

</html>
