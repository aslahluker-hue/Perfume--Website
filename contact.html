<!DOCTYPE html>
<html>

<head>

<title>Contact - As Solutions</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#111;
color:white;
}

nav{
background:black;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
}

.logo{
font-size:30px;
color:gold;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:bold;
}

nav a:hover{
color:gold;
}

.contact{
width:500px;
max-width:95%;
margin:60px auto;
background:#222;
padding:30px;
border-radius:10px;
}

.contact h1{
text-align:center;
margin-bottom:20px;
color:gold;
}

input,
textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
font-size:16px;
}

textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:15px;
background:red;
color:white;
border:none;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkred;
}

footer{
background:black;
text-align:center;
padding:20px;
margin-top:40px;
}

footer p{
font-size:16px;
margin:5px;
}

@media(max-width:768px){

nav{
flex-direction:column;
padding:15px;
}

nav div:last-child{
margin-top:10px;
}

nav a{
margin:0 10px;
}

.logo{
margin-bottom:10px;
}

.contact{
width:95%;
margin:20px auto;
padding:20px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">
As Solutions
</div>

<div>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="contact.html">Contact</a>
</div>

</nav>

<div class="contact">

<h1>Contact Us</h1>

<form onsubmit="sendWhatsApp(); return false;">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<textarea id="message" placeholder="Your Message" required></textarea>

<button type="submit">Send to WhatsApp</button>

</form>

</div>

<footer>

<p>© 2026 As Solutions. All Rights Reserved.</p>

<p>Email: assolutions@gmail.com | Phone: +91 8547576987</p>

</footer>

<script>

function sendWhatsApp(){

var name=document.getElementById("name").value;
var email=document.getElementById("email").value;
var message=document.getElementById("message").value;

var url="https://wa.me/918547576987?text="
+"Name: "+encodeURIComponent(name)
+"%0AEmail: "+encodeURIComponent(email)
+"%0AMessage: "+encodeURIComponent(message);

window.open(url,"_blank");

}

</script>

</body>

</html>
