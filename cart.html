<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Cart - AS Solutions</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

.product{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ddd;
padding:15px 0;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.total{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:right;
}

.checkout{
display:block;
margin-top:20px;
text-align:center;
}

.checkout button{
background:green;
}

</style>

</head>

<body>

<div class="container">

<h1>🛒 Shopping Cart</h1>

<div class="product">

<div>

<h3>Luxury Perfume</h3>

<p>₹1,499</p>

</div>

</div>

<div class="total">

Total : ₹1,499

</div>

<div class="checkout">

<a href="checkout.html">

<button>Proceed to Checkout</button>

</a>

</div>

</div>

</body>
</html>
